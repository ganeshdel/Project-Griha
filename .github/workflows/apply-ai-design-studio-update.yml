name: Apply AI Design Studio update

on:
  push:
    branches:
      - agent/replace-ai-design-studio-code
    paths:
      - scripts/apply-ai-design-studio-update.mjs
      - .github/workflows/apply-ai-design-studio-update.yml
  workflow_dispatch:

permissions:
  contents: write

jobs:
  apply-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: agent/replace-ai-design-studio-code
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Apply supplied source changes
        run: node scripts/apply-ai-design-studio-update.mjs
      - name: Validate JavaScript syntax
        run: |
          node --check ai-design-studio/src/main.js
          node --check ai-design-studio/src/ai.js
          node --check ai-design-studio/src/model.js
      - name: Commit generated source changes
        run: |
          if git diff --quiet; then
            echo "No source changes required"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add ai-design-studio/src/main.js ai-design-studio/src/ai.js ai-design-studio/src/model.js
          git commit -m "Replace AI Design Studio source modules"
          git push
